name: Test and Build Pipeline

on:
    push:
      branches:
        - main
        - develop
      paths-ignore:
        - .github/**
        - docs/**
        - README.md
        - db.sqlite3.dist
    workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
    unit-tests:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout the Code
          uses: actions/checkout@v5
        - name: Set Up Python
          uses: actions/setup-python@v6
          with:
            python-version: '3.13.12'
            cache: 'pip'
        - name: Install Swirl
          run: ./install.sh
        - name: Install the Unit Tests
          run: ./install-test.sh
        - name: Run the Unit Tests
          run: pytest

    db-dist:
      needs: unit-tests
      runs-on: ubuntu-latest
      concurrency: db-dist-cgos
      services:
        redis:
          image: redis
          options: >-
            --health-cmd "redis-cli ping"
            --health-interval 10s
            --health-timeout 5s
            --health-retries 5
          ports:
            - 6379:6379
      steps:
        - name: Checkout the Code
          uses: actions/checkout@v5
        - name: Pull the Latest (for just this branch)
          run: git pull origin ${{ github.ref_name }}
        - name: Set Up Python
          uses: actions/setup-python@v6
          with:
            python-version: '3.13.12'
            cache: 'pip'
        - name: Install Swirl (with a timeout)
          run: ./install.sh
          timeout-minutes: 10
        - name: Delete the db.sqlite3 File
          run: rm db.sqlite3
        - name: Setup Swirl
          run: python swirl.py setup
        - name: Create the Superuser
          run: DJANGO_SUPERUSER_PASSWORD=password python manage.py createsuperuser --email admin@example.com --username admin --noinput
        - name: Start Swirl
          run: python swirl.py start
        - name: Load the Default SearchProviders
          run:  python swirl_load.py -u admin -p password -s http://localhost:8000/ 'SearchProviders/preloaded.json'
        - name: Load the Default AIProviders
          run:  python swirl_load.py -u admin -p password -s http://localhost:8000/ 'AIProviders/preloaded.json'
        - name: Stop Swirl
          run: python swirl.py stop
        - name: Create a New db.dist File
          run: cp db.sqlite3 db.sqlite3.dist
        - name: Create a Pull Request
          id: createpr
          uses: peter-evans/create-pull-request@v7
          with:
            add-paths: db.sqlite3.dist
            branch: db_dist/autoupdate
            delete-branch: true
            commit-message: Update the db.sqlite3.dist file
            committer: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
            author: ${{ github.actor }} <${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com>
            title: 'New db.sqlite3.dist generated by a db-dist.yml workflow'
            body: |
              New `db.sqlite3.dist` file generated by GitHub Action run ${{ github.run_number }}
        - name: Auto-Approve the PR
          if: steps.createpr.outputs.pull-request-operation == 'created'
          run: |
            echo "${{ secrets.GH_ACTIONS_TOKEN }}" | gh auth login --with-token
            gh pr review --approve "${{ steps.createpr.outputs.pull-request-number }}"
        - name: Auto-Merge the PR
          if: steps.createpr.outputs.pull-request-operation == 'created'
          run: |
            echo "${{ secrets.GH_ACTIONS_TOKEN }}" | gh auth login --with-token
            gh pr merge --merge --auto "${{ steps.createpr.outputs.pull-request-number }}"

    qa-suite:
      needs: db-dist
      runs-on: ubuntu-latest
      services:
        redis:
          image: redis
          options: >-
            --health-cmd "redis-cli ping"
            --health-interval 10s
            --health-timeout 5s
            --health-retries 5
          ports:
            - 6379:6379
      steps:
        - name: Checkout the Code
          uses: actions/checkout@v5
        - name: Pull the Latest (for just this branch)
          run: git pull origin ${{ github.ref_name }}
        - name: Login to Docker Hub
          uses: docker/login-action@v3
          with:
            username: ${{ secrets.SBS_DOCKER_USER }}
            password: ${{ secrets.SBS_DOCKER_PAT }}
        - name: Set Up Python
          uses: actions/setup-python@v6
          with:
            python-version: '3.13.12'
            cache: 'pip'
        - name: Install Swirl
          run: ./install.sh
        - name: Setup Swirl
          run: python swirl.py setup
        - name: Install the Galaxy UI Preview
          run: ./install-ui.sh -p
          env:
            MSAL_CB_PORT: 8000
            MSAL_HOST: localhost
        - name: Start Swirl
          run: |
            echo "OPENAI_API_KEY='${{ secrets.QA_OPENAI_KEY }}'" >> .env
            cat .env
            python swirl.py start
          env:
            ALLOWED_HOSTS: localhost,host.docker.internal
            SWIRL_RAG_MODEL: gpt-4.1
            SWIRL_REWRITE_MODEL: gpt-4.1
            SWIRL_QUERY_MODEL: gpt-4.1
        - name: PATCH the Web PSE Config
          env:
            JSON: ${{ secrets.QA_PSE_WEB }}
            API_ENDPOINT: http://localhost:8000/swirl/searchproviders/1/
            PASSWORD: ${{ secrets.QA_ADMIN_PW }}
          run: |
            sleep 15
            curl -X PATCH "$API_ENDPOINT" \
              -u admin:"$PASSWORD" \
              -H "Content-Type: application/json" \
              -d "$JSON"
        # DS-5598: LinkedIn was removed from SearchProviders/preloaded.json
        # (it was a Google PSE flavour pointing at linkedin.com that the team
        # is not maintaining). The previous "PATCH the LinkedIn PSE Config"
        # step targeted provider ID 3, which after the removal is no longer
        # LinkedIn — it's "Docs - SWIRL". Removing this step
        # avoids overwriting the Documentation provider's config with the
        # stale LinkedIn PSE secret.
        #
        # The SWIRL Docs PSE config moved from provider ID 4 -> ID 3 because
        # LinkedIn no longer occupies a slot above it; the API_ENDPOINT
        # below is updated to match. This mirrors the equivalent edit on
        # qa-suite.yml in PR #1850.
        - name: PATCH the SWIRL Docs PSE Config
          env:
            JSON: ${{ secrets.QA_PSE_DOCS }}
            API_ENDPOINT: http://localhost:8000/swirl/searchproviders/3/
            PASSWORD: ${{ secrets.QA_ADMIN_PW }}
          run: |
            curl -X PATCH "$API_ENDPOINT" \
              -u admin:"$PASSWORD" \
              -H "Content-Type: application/json" \
              -d "$JSON"
        - name: Decode BigQuery token and create JSON file
          run: |
            echo "$BIGQUERY_TOKEN_BASE64" | base64 --decode > "${{ github.workspace }}/token.json"
          env:
            BIGQUERY_TOKEN_BASE64: ${{ secrets.QA_BIGQUERY_TOKEN_BASE64 }}
        - name: Run the QA Suite
          run: |
            echo "SWIRL_TEST_HOST=localhost" > .env.qa
            echo "MSAL_HOST=localhost" >> .env.qa
            echo "MSAL_CB_PORT=8000" >> .env.qa
            echo "QA_ADMIN_PW=${{ secrets.QA_ADMIN_PW }}" >> .env.qa
            echo "QA_OPENAI_KEY=${{ secrets.QA_OPENAI_KEY }}" >> .env.qa
            echo "QA_NLR_USERNAME=${{ secrets.QA_NLR_USERNAME }}" >> .env.qa
            echo "QA_NLR_PASSWORD=${{ secrets.QA_NLR_PASSWORD }}" >> .env.qa
            echo "QA_CRUNCHBASE_KEY=${{ secrets.QA_CRUNCHBASE_KEY }}" >> .env.qa
            echo "QA_BLOCKCHAIN_KEY=${{ secrets.QA_BLOCKCHAIN_KEY }}" >> .env.qa
            echo "QA_YOUTRACK_TOKEN=${{ secrets.QA_YOUTRACK_TOKEN }}" >> .env.qa
            echo "QA_GITHUB_TOKEN=${{ secrets.QA_GITHUB_TOKEN }}" >> .env.qa
            echo "BIGQUERY_TOKEN_PATH=${{ github.workspace }}/token.json" >> .env.qa
            echo "QA_TRELLO_KEYS=${{ secrets.QA_TRELLO_KEYS }}" >> .env.qa
            echo "========"
            cat .env.qa
            echo "========"
            docker run --net=host --env-file .env.qa -t swirlai/swirl-search-qa:automated-tests-develop sh -c "behave --tags=qa_suite,community"
        # DS-5598: dump every ./logs/*.log produced by `python swirl.py
        # start` into the qa-suite step output so backend WARNING /
        # ERROR lines (RAG-DIAG, exception tracebacks, AIProvider
        # allocation messages) appear in the GitHub Actions log. Without
        # this the swirl backend logs live on the runner's temp disk
        # and vanish when the job ends — invisible in the test-build-
        # pipeline artifact. `if: always()` runs the step even when
        # behave fails (which is exactly when the logs are most useful).
        #
        # The first iteration of this step (PR #1864) only globbed
        # `logs/*.log` from the default cwd and the step finished in 0s
        # in run #329 — either the cwd isn't where swirl writes its
        # logs, or the logs are nested under a subdir. This version
        # falls back to a workspace-wide find so we actually see the
        # backend output regardless of cwd resolution, and also prints
        # the cwd / workspace listing up front to make future debugging
        # one read of the step output rather than two iterations.
        - name: Dump swirl backend logs
          if: always()
          run: |
            set +e
            echo "===== pwd: $(pwd)"
            echo "===== GITHUB_WORKSPACE: ${GITHUB_WORKSPACE}"
            echo "===== top-level listing:"
            ls -la
            echo "===== ./logs (if present):"
            ls -la ./logs 2>/dev/null || echo "(no ./logs in $(pwd))"
            echo "===== find workspace for *.log under */logs/*:"
            find "${GITHUB_WORKSPACE:-.}" -name "*.log" -path "*/logs/*" 2>/dev/null
            shopt -s nullglob
            log_files=( "${GITHUB_WORKSPACE:-.}"/logs/*.log )
            if [ ${#log_files[@]} -eq 0 ]; then
              echo "===== no logs/*.log under GITHUB_WORKSPACE; searching workspace"
              mapfile -t log_files < <(find "${GITHUB_WORKSPACE:-.}" -name "*.log" -path "*/logs/*" 2>/dev/null)
            fi
            for f in "${log_files[@]}"; do
              echo "=================================================="
              echo "===== $f"
              echo "=================================================="
              cat "$f" || true
            done
            echo "===== Dump swirl backend logs: done"

    swirl-docker:
      needs: qa-suite
      runs-on: ubuntu-latest
      steps:
        - name: Check disk before cleanup
          run: |
            echo "=== DISK USAGE BEFORE CLEANUP ==="
            df -h

        - name: Free disk space on runner (SDKs & toolcache)
          run: |
            echo "=== REMOVING LARGE PREINSTALLED SDKs & TOOL CACHES ==="
            echo "Removing: /usr/share/dotnet"
            sudo rm -rf /usr/share/dotnet || true

            echo "Removing: /usr/local/lib/android"
            sudo rm -rf /usr/local/lib/android || true

            echo "Removing: /opt/ghc"
            sudo rm -rf /opt/ghc || true

            echo "Removing: /usr/local/.ghcup"
            sudo rm -rf /usr/local/.ghcup || true

            echo "Removing: /opt/hostedtoolcache"
            sudo rm -rf /opt/hostedtoolcache || true

            echo
            echo "=== DISK USAGE AFTER SDK/TOOLCACHE CLEANUP ==="
            df -h

        - name: Clean up any existing Docker data
          run: |
            echo "=== DOCKER SYSTEM PRUNE (IF ANY) ==="
            docker system df || true
            docker system prune -af || true
            docker builder prune -af || true

            echo
            echo "=== DISK USAGE AFTER DOCKER CLEANUP ==="
            df -h

        - name: Checkout the Code
          uses: actions/checkout@v5

        - name: Pull the Latest (for just this branch)
          run: git pull origin ${{ github.ref_name }}

        - name: Login to Docker Hub
          uses: docker/login-action@v3
          with:
            username: ${{ secrets.SBS_DOCKER_USER }}
            password: ${{ secrets.SBS_DOCKER_PAT }}

        - name: Build and Push Swirl Docker Image
          run: |
            BRANCH_NAME=${GITHUB_REF#refs/heads/}
            TAG_NAME=$([ "$BRANCH_NAME" = "main" ] && echo "latest" || echo "$BRANCH_NAME")
            echo "Building tag: swirlai/swirl-search:$TAG_NAME"
            docker buildx use devBuilder || docker buildx create --name devBuilder --use
            docker buildx build \
              -t swirlai/swirl-search:$TAG_NAME \
              --platform linux/amd64,linux/arm64 \
              --push .

        - name: Update the Docker Repo Description
          if: github.ref == 'refs/heads/main'
          uses: peter-evans/dockerhub-description@v5
          with:
            username: ${{ secrets.SBS_DOCKER_USER }}
            password: ${{ secrets.SBS_DOCKER_PAT }}
            repository: swirlai/swirl-search
            enable-url-completion: true

        - name: Upload Log Files
          if: always()
          uses: actions/upload-artifact@v4
          with:
            name: log-files
            path: |
              logs/
              /var/log/syslog*
